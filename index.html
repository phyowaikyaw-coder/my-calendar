<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Calendar App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>

    <div class="app-container">
        <div class="header-section">
            <div class="box month-box">
                <span class="btn-text" id="prevMonth">&lt;</span>
                <span id="monthDisplay">MARCH</span>
                <span class="btn-text" id="nextMonth">&gt;</span>
            </div>
            <div class="box year-box">
                <span class="btn-text" id="prevYear">&lt;</span>
                <span id="yearDisplay">2026</span>
                <span class="btn-text" id="nextYear">&gt;</span>
            </div>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <div class="day-name sun">SUN</div>
            <div class="day-name">MON</div>
            <div class="day-name">TUE</div>
            <div class="day-name">WED</div>
            <div class="day-name">THUR</div>
            <div class="day-name">FRI</div>
            <div class="day-name sat">SAT</div>
        </div>

        <div class="task-label-title">TODAY TASKS</div>
        <div class="task-list">
            <div class="task-item"><span class="task-num">1</span><input type="text" id="today1" placeholder="Write Here..."><span class="check-mark" onclick="saveTask('today1')">OK</span></div>
            <div class="task-item"><span class="task-num">2</span><input type="text" id="today2" placeholder="Write Here..."><span class="check-mark" onclick="saveTask('today2')">OK</span></div>
            <div class="task-item"><span class="task-num">3</span><input type="text" id="today3" placeholder="Write Here..."><span class="check-mark" onclick="saveTask('today3')">OK</span></div>
        </div>

        <div class="task-label-title">TOMORROW TASKS</div>
        <div class="task-list">
            <div class="task-item"><span class="task-num">1</span><input type="text" id="tomorrow1" placeholder="Write Here..."><span class="check-mark" onclick="saveTask('tomorrow1')">OK</span></div>
            <div class="task-item"><span class="task-num">2</span><input type="text" id="tomorrow2" placeholder="Write Here..."><span class="check-mark" onclick="saveTask('tomorrow2')">OK</span></div>
            <div class="task-item"><span class="task-num">3</span><input type="text" id="tomorrow3" placeholder="Write Here..."><span class="check-mark" onclick="saveTask('tomorrow3')">OK</span></div>
        </div>

        <div class="task-label-title memory-label">YOUR MEMORY DAY</div>
        <div class="task-list memory-list">
            <div class="task-item"><span class="task-num">M1</span><input type="text" id="memory1" placeholder="Record a memory..."><span class="check-mark" onclick="saveTask('memory1')">OK</span></div>
            <div class="task-item"><span class="task-num">M2</span><input type="text" id="memory2" placeholder="Record a memory..."><span class="check-mark" onclick="saveTask('memory2')">OK</span></div>
            <div class="task-item"><span class="task-num">M3</span><input type="text" id="memory3" placeholder="Record a memory..."><span class="check-mark" onclick="saveTask('memory3')">OK</span></div>
        </div>
    </div> 

    <script src="script.js"></script>
</body>
</html>
